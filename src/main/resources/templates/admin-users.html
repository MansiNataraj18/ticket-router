<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Users</title>

    <link rel="stylesheet" href="/css/style.css">

</head>


<body>

<div th:replace="~{fragments/navbar :: navbar(activePage='admin-users', userName=${userName}, isAdmin=${isAdmin}, isDepartmentStaff=false)}"></div>

<div class="container">

    <div class="page-header">
        <h1>Manage Users</h1>
        <p>Create role-specific accounts for departments and admins.</p>
    </div>

    <section class="card">

        <h2>Create User</h2>

        <p class="alert alert-error" th:if="${error}" th:text="${error}"></p>

        <p class="alert alert-success" th:if="${param.created}">User created successfully.</p>

        <form th:action="@{/admin/users}" method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <input type="text" name="fullName" placeholder="Full name" required>

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <select name="userTypeName" required>
                <option value="" disabled selected>Select a role...</option>
                <option th:each="type : ${userTypes}"
                        th:value="${type.name}"
                        th:text="${type.description != null ? type.description : type.name}">
                    Role
                </option>
            </select>

            <button type="submit">Create User</button>

        </form>

    </section>


    <section class="card">

        <h2>Existing Users</h2>

        <div class="filter-bar" style="padding:0 0 16px;">

            <span class="filter-label">Type:</span>

            <div class="filter-group">

                <a class="filter-pill"
                   th:classappend="${selectedUserType == null} ? ' active'"
                   th:href="@{/admin/users}">All</a>

                <a th:each="type : ${userTypes}"
                   class="filter-pill"
                   th:classappend="${selectedUserType == type.name} ? ' active'"
                   th:href="@{/admin/users(type=${type.name})}"
                   th:text="${type.description != null ? type.description : type.name}">Type</a>

            </div>

        </div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-state">

            <h3>No users of this type</h3>

        </div>

        <div th:each="user : ${users}" class="ticket-card">

            <p>
                <strong th:text="${user.fullName}">Full Name</strong>
                &mdash;
                <span th:text="${user.username}">username</span>
            </p>

            <p>
                <strong>Role:</strong>
                <span th:text="${user.userType.description != null ? user.userType.description : user.userType.name}">Role</span>
            </p>

            <p th:if="${!user.enabled}" class="alert alert-error" style="display:inline-block;">
                Disabled
            </p>

        </div>

    </section>


</div>


</body>

</html>
