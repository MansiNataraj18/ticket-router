<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page">

<div class="auth-card">

    <h2>🎫 Smart Ticket Router</h2>

    <p class="alert alert-error" th:if="${param.error}">Invalid username or password.</p>

    <p class="alert alert-success" th:if="${param.signup}">Account created. Please log in.</p>

    <p class="alert alert-success" th:if="${param.logout}">You have been logged out.</p>

    <form th:action="@{/login}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <input
                type="text"
                name="username"
                placeholder="Enter username"
                required>

        <input
                type="password"
                name="password"
                placeholder="Enter password"
                required>

        <button type="submit">
            Login
        </button>

    </form>

    <p class="switch-link">
        Don't have an account?
        <a href="/signup">Sign up</a>
    </p>

</div>

</body>
</html>
