<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Sign Up</title>

    <style>

        body {
            font-family: system-ui, sans-serif;
            background: #f4f6f9;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;

            padding: 30px;

            width: 350px;

            border-radius: 12px;

            box-shadow: 0 8px 20px rgba(0,0,0,.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;

            padding: 10px;

            margin-top: 15px;

            box-sizing: border-box;
        }

        button {
            width: 100%;

            margin-top: 20px;

            padding: 12px;

            background: #2563eb;

            color: white;

            border: none;

            border-radius: 8px;

            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            color: #dc2626;
            text-align: center;
            margin-top: 10px;
        }

        .switch-link {
            text-align: center;
            margin-top: 15px;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>Create Account</h2>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/signup}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <input
                type="text"
                name="fullName"
                placeholder="Full name"
                required>

        <input
                type="text"
                name="username"
                placeholder="Choose a username"
                required>

        <input
                type="password"
                name="password"
                placeholder="Choose a password"
                required>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <p class="switch-link">
        Already have an account?
        <a href="/login">Log in</a>
    </p>

</div>

</body>
</html>
