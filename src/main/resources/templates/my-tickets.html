<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Tickets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar(activePage='my-tickets', userName=${userName}, isAdmin=${isAdmin}, isDepartmentStaff=${isDepartmentStaff})}"></div>
<div class="container">
    <div class="page-header">
        <h1>My Tickets</h1>
        <p>View your previous support requests.</p>
    </div>

    <div th:if="${#lists.isEmpty(tickets)}" class="card empty-state">
        <h3>No tickets found</h3>
        <p>Your submitted tickets will appear here.</p>
    </div>

    <div th:each="ticket : ${tickets}"
         class="ticket-card">
        <h2 th:text="${ticket.category}">Category</h2>
        <p>
            <strong>Issue:</strong>
            <span th:text="${ticket.message}">Message</span>
        </p>
        <p>
            <strong>Priority:</strong>
            <span th:text="${ticket.priority}"
                  th:classappend="${#strings.toLowerCase(ticket.priority)}">HIGH</span>
        </p>
        <p>
            <strong>Assigned Team:</strong>
            <span th:text="${ticket.assignedTeam}">Team</span>
        </p>
        <p>
            <strong>Status:</strong>
            <span th:text="${ticket.status}"
                  th:classappend="'status-' + ${#strings.arrayJoin(#strings.toLowerCase(ticket.status).split('_'), '-')}">status</span>
        </p>

        <div class="reasoning">
            <h3 style="margin-top:0;">AI Reasoning</h3>
            <p th:text="${ticket.reasoning}" style="margin:0;">Reasoning</p>
        </div>

        <small style="color:var(--color-text-muted);">
            Created:
            <span th:text="${ticket.createdAt}">Date</span>
        </small>
    </div>
</div>
</body>
</html>
