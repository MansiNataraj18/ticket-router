<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Smart Ticket Router</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">


    <header class="top-bar">

        <div>
            <h1>🎫 Smart Ticket Router</h1>

            <p>
                AI-powered support ticket classification using RAG
            </p>
        </div>


        <div class="user-section">

            <span>
                Welcome,
                <strong th:text="${userName}"></strong>
            </span>

            <br>

            <a href="/logout">
                Logout
            </a>
            <a href="/my-tickets">
    My Tickets
</a>

        </div>

    </header>



    <section class="card">

        <h2>Submit Ticket</h2>


        <textarea
            id="message"
            placeholder="Describe the customer's issue..."></textarea>


        <button onclick="routeTicket()">
            Analyze Ticket
        </button>

    </section>




    <section
        id="result"
        class="card result"
        style="display:none;">


        <h2>Routing Result</h2>


        <div class="grid">


            <div class="field">

                <label>
                    Category
                </label>

                <span id="category"></span>

            </div>



            <div class="field">

                <label>
                    Priority
                </label>

                <span id="priority"></span>

            </div>



            <div class="field">

                <label>
                    Assigned Team
                </label>

                <span id="team"></span>

            </div>


        </div>




        <div class="reasoning">

            <h3>
                AI Reasoning
            </h3>


            <p id="reasoning"></p>


        </div>


    </section>


</div>





<script>

async function routeTicket() {


    const message =
        document
            .getElementById("message")
            .value;



    if (!message.trim()) {

        alert(
            "Please enter a ticket message"
        );

        return;

    }



    const result =
        document.getElementById("result");



    result.style.display = "block";



    document
        .getElementById("reasoning")
        .innerText =
        "Analyzing with AI...";



    try {


        const response =
            await fetch(
                "/api/tickets/route",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        message:message

                    })

                }
            );



        if (!response.ok) {

            throw new Error(
                "Request failed: "
                + response.status
            );

        }



        const data =
            await response.json();




        document
            .getElementById("category")
            .innerText =
            data.category;




        document
            .getElementById("priority")
            .innerText =
            data.priority;




        document
            .getElementById("team")
            .innerText =
            data.assignedTeam;




        document
            .getElementById("reasoning")
            .innerText =
            data.reasoning;




        document
            .getElementById("priority")
            .className =
            data.priority.toLowerCase();



    }


    catch(error) {


        document
            .getElementById("reasoning")
            .innerText =
            "Error: "
            + error.message;


    }


}


</script>


</body>

</html>
