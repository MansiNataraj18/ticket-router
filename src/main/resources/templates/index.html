<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Smart Ticket Router</title>

    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 640px;
            margin: 40px auto;
        }

        textarea {
            width: 100%;
            height: 100px;
            font-size: 15px;
        }

        button {
            padding: 8px 16px;
            margin-top: 8px;
        }

        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            background: #f4f4f4;
            white-space: pre-wrap;
        }

        .HIGH {
            border-left: 4px solid #d33;
        }

        .MEDIUM {
            border-left: 4px solid #e0a800;
        }

        .LOW {
            border-left: 4px solid #2a2;
        }
    </style>
</head>

<body>

<h2>Smart Ticket Router</h2>
<h3>
    Welcome, <span th:text="${userName}"></span>
</h3>

<input 
    type="hidden"
    id="userName"
    th:value="${userName}">

<textarea id="message"
          placeholder="Paste a support ticket message..."></textarea>

<br>

<button onclick="routeTicket()">
    Route Ticket
</button>


<div id="result" style="display:none;"></div>


<script th:inline="javascript">

async function routeTicket() {

    const message =
        document.getElementById('message').value;

    const resultDiv =
        document.getElementById('result');


    resultDiv.style.display = 'block';
    resultDiv.className = '';
    resultDiv.textContent = 'Routing...';


    try {

        const response = await fetch(
            '/api/tickets/route',
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message
                })
            }
        );


        if (!response.ok) {
            throw new Error(
                "Request failed: " + response.status
            );
        }


        const data = await response.json();


        resultDiv.className = data.priority;


        resultDiv.textContent =
            `Category: ${data.category}
Priority: ${data.priority}
Team: ${data.assignedTeam}
Reasoning: ${data.reasoning}`;


    } catch(error) {

        resultDiv.className = '';

        resultDiv.textContent =
            "Error: " + error.message;
    }
}

</script>

</body>
</html>
